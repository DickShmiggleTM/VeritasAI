<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esoteric Veritas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'sans': ['Inter', 'sans-serif'],
              'serif': ['Cinzel', 'serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
              'background-shift': 'backgroundShift 20s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: 0, transform: 'translateY(10px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              },
              pulseGlow: {
                '0%, 100%': { boxShadow: '0 0 10px 0px rgba(167, 139, 250, 0.4)' },
                '50%': { boxShadow: '0 0 20px 5px rgba(167, 139, 250, 0.6)' },
              },
              backgroundShift: {
                '0%, 100%': { 'background-color': 'hsl(222, 83%, 5%)' }, /* slate-950 */
                '50%': { 'background-color': 'hsl(244, 53%, 10%)' },
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.19.0",
    "marked": "https://aistudiocdn.com/marked@^16.3.0",
    "marked-highlight": "https://aistudiocdn.com/marked-highlight@^2.2.2",
    "highlight.js": "https://aistudiocdn.com/highlight.js@^11.11.1"
  }
}
</script>
</head>
  <body class="bg-slate-950 text-slate-300 animate-background-shift">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
